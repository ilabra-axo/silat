server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # WASM MIME type already in base mime.types; no override needed

    # SPA — all routes fall back to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Service worker must never be cached — fixed filename, updated on each deploy
    location = /flutter_service_worker.js {
        add_header Cache-Control "no-store";
    }

    # Cache hashed assets aggressively
    location ~* \.(js|css|woff2?|png|ico|svg|wasm)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location = /index.html {
        add_header Cache-Control "no-store";
    }
}
